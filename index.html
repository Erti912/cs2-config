<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Config Manager</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <div class="top-bar">
            <button id="download-btn">Download</button>
            <button id="copy-btn">Copy</button>
            <button id="copy-ps-btn">Copy PS</button>
            <input type="text" id="search-input" placeholder="Search...">
            <button id="reset-btn">Reset to default</button>
            <button id="open-cfg-btn">Open cfg folder</button>
        </div>
    </header>
    <main>
        <textarea id="config-area"></textarea>
        <button id="copy-selected-btn">Copy selected</button>
        <button id="copy-all-btn">Copy all</button>
        <div id="typescript-typing">PowerShell Code:</div>
        <pre id="powershell-code"># Sample PowerShell Code</pre>
    </main>
    <footer>
        <p>&copy; 2026 Config Manager</p>
    </footer>
    <script>
        // JavaScript for functionality
        document.getElementById('search-input').addEventListener('input', function() {
            const filter = this.value.toLowerCase();
            const lines = document.getElementById('config-area').value.split('\n');
            const filteredLines = lines.filter(line => line.toLowerCase().includes(filter));
            document.getElementById('config-area').value = filteredLines.join('\n');
        });

        document.getElementById('reset-btn').addEventListener('click', function() {
            document.getElementById('config-area').value = ''; // Reset logic can be added
        });

        document.getElementById('open-cfg-btn').addEventListener('click', function() {
            /* Logic to copy the cfg folder path */
            navigator.clipboard.writeText('C:/path/to/cfg');
        });

        // Smooth scrolling and section anchors logic can be added
        // Mobile layout improvements in CSS

        // Typing animation effect
        const typingText = '# Sample PowerShell Code';
        let index = 0;
        const typingEffect = setInterval(() => {
            if (index < typingText.length) {
                document.getElementById('powershell-code').textContent += typingText.charAt(index);
                index++;
            } else {
                clearInterval(typingEffect);
            }
        }, 100);
    </script>
</body>
</html>
